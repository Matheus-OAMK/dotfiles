"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[~>](purple)"
error_symbol = "[~>](red)"
vimcmd_symbol = "[в– ](dimmed purple)"
# not supported in zsh
vimcmd_replace_one_symbol = "в—Ң"
vimcmd_replace_symbol = "в–Ў"
vimcmd_visual_symbol = "в–ј"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "вӢҲв”Ҳ "
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[вӯҳ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "вҢӮ"
truncation_length = 2
truncation_symbol = ""
truncate_to_repo=true
read_only = " рҹ”’"
use_os_path_sep = true
style = "italic blue"
format = '[$path]($style)[$read_only]($read_only_style) '

[cmd_duration]
min_time = 0
format = "[в—„ $duration ](italic white)"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[в–¶](blue italic)"

[localip]
ssh_only = true
format = " в—Ҝ[$localipv4](bold purple)"
disabled = false

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "в–Ҳ"
charging_symbol = "[вҶ‘](italic bold green)"
discharging_symbol = "вҶ“"
unknown_symbol = "в–‘"
empty_symbol = "в–ғ"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$symbol$branch(:$remote_branch) ]($style)"
symbol = "[оңҘ ](italic green)"
style = "italic green"
truncation_symbol = "вӢҜ"
truncation_length = 11
only_attached = true

[git_metrics]
format = '([в–ҙ$added]($added_style))([в–ҝ$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic bright-blue"
format = "([$all_status$ahead_behind ]($style))"
conflicted = "[вҖј ](italic bright-red)"
ahead      = "[вҮЎ ](italic green)"
behind     = "[вҮЈ ](italic red)"
diverged   = "[вҮ• ](italic bright-purple)"
untracked  = "[? ](italic yellow)"
stashed    = "[вүЎ ](italic cyan)"
modified   = "[вңұ ](italic blue)"
staged     = "[вңҡ ](italic bright-green)"
renamed    = "[вһң ](italic bright-blue)"
deleted    = "[вңҳ ](italic red)"

[deno]
format = " [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "оҹҖ "
style = "green bold"

[lua]
format = " [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "оҳ  "
style = "bold bright-yellow"

[nodejs]
format = " [${symbol}$version]($style)"
version_format = "${raw}"
style = "bold bright-green"
symbol = "оҙҚ "
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = ' [${symbol}${version}( \($virtualenv\))]($style)'
symbol = "оҳҶ "
version_format = "${raw}"
python_binary = [".venv/bin/python", "python", "python3", "python2"]
style = "bold bright-yellow"

[ruby]
format = " [${symbol}${version}]($style)"
symbol = "оһ‘ "
version_format = "${raw}"
style = "bold red"

[rust]
format = " [$symbol$version]($style)"
symbol = "оһЁ "
version_format = "${raw}"
style = "bold red"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "в—Ё "
style = "dimmed yellow italic bold"

[swift]
format = " [${symbol}${version}]($style)"
symbol = "оқ• "
style = "bold bright-red"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold blue"
symbol = "оһӯ "

[buf]
symbol = "в–  "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "оҳһ "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "в—Ҝ "
format = " [$symbol$environment]($style)"

[dart]
symbol = "в—Ғв—… "
format = " [$symbol($version )]($style)"

[docker_context]
symbol = "пҢҲ "
format = " [$symbol$context]($style)"

[elixir]
